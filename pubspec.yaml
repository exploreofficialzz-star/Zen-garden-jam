name: zen_garden_jam_flutter
description: "Zen Garden Jam - A hybrid-casual puzzle game with ASMR aesthetics."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flame: ^1.19.0
  google_mobile_ads: ^5.1.0
  flutter_local_notifications: ^17.1.0
  # FIX: timezone was missing from pubspec — it's used in notification_manager.dart
  # (tz.TZDateTime, tz.local) and requires tz.initializeTimeZones() to be called.
  # Without this explicit declaration some build configs fail to resolve it.
  timezone: ^0.9.4
  shared_preferences: ^2.2.3
  provider: ^6.1.5
  audioplayers: ^6.1.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
